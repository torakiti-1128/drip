name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Deployment Preflight
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - name: Verify infrastructure templates
        run: |
          test -f infrastructure/fly/fly.toml
          test -f infrastructure/vercel/vercel.json

  migrate-production:
    name: Run Production Migrations
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ hashFiles('backend/Gemfile') != '' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Run DB migrations
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -C "cd /app && bin/rails db:migrate" --app drip-api

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs:
      - preflight
      - migrate-production
    if: ${{ always() && hashFiles('backend/Gemfile') != '' && needs.preflight.result == 'success' && needs.migrate-production.result == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Rails API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config infrastructure/fly/fly.toml --app drip-api

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ hashFiles('frontend/package.json') != '' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - name: Trigger Vercel deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          cd frontend
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --token "$VERCEL_TOKEN"
