name: Task
description: 機能追加・技術負債・ドキュメント更新の標準テンプレート
title: "[Task] "
labels:
  - needs-triage
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Type
      options:
        - feature
        - tech-debt
        - docs
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - frontend
        - backend
        - gemini
        - infra
        - docs
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 1〜2文で記述
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: 1行1項目で記載
      placeholder: |
        - [ ] API が 201 を返す
        - [ ] 異常系テストが追加される
    validations:
      required: true
  - type: textarea
    id: related_docs
    attributes:
      label: 関連設計書
      placeholder: |
        - docs/03_API_DESIGN/README.md
        - docs/09_TESTING_STRATEGY/README.md
    validations:
      required: true
